# This rule is not used by the project pd-manager itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to pdai.pdai.io resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: pd-manager
    app.kubernetes.io/managed-by: kustomize
  name: pdengineprofile-viewer-role
rules:
- apiGroups:
  - pdai.pdai.io
  resources:
  - pdengineprofiles
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - pdai.pdai.io
  resources:
  - pdengineprofiles/status
  verbs:
  - get
